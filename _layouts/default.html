<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | Jonatan Franco</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  
  <script>
    MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>

  <header class="navbar">
    <nav class="container">
      <a href="{{ '/' | relative_url }}" class="nav-logo">Jonatan Franco</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Início</a>
        <a href="/artigos">Artigos</a>
        <a href="/psicometria">Psicometria</a>
        <a href="/epistemologia">Epistemologia</a>
      </div>
    </nav>
  </header>

  {% if page.url == "/" %}
  <section class="hero">
    <div class="container">
      <h1>Reflexões sobre Psicometria</h1>
      <p>Psicologia Matemática, Epistemologia e Comportamento.</p>
    </div>
  </section>
  {% endif %}

  <main class="container content-area">
    <article>
      {{ content }}
    </article>
  </main>

  <footer>
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} Jonatan Franco - Psicólogo & Pesquisador</p>
    </div>
  </footer>

</body>
</html>
