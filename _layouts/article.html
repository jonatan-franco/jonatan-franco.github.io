<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>{{ page.title }} | {{ site.title | default: "Jonatan Franco" }}</title>
  <meta name="description" content="{{ page.excerpt | strip_html | truncate: 160 | default: site.description }}">
  
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
  <meta property="og:description" content="{{ page.excerpt | strip_html | truncate: 160 | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}/assets/img/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;600&family=JetBrains+Mono&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/article.css' | relative_url }}">
  
  <style>
    /* ========== MODAL DE CITAÇÃO ========== */
    .cite-modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }
    .cite-modal-content {
      background: var(--bg-panel, #111827);
      border: 1px solid var(--cyan, #00E5FF);
      border-radius: 16px;
      width: 90%;
      max-width: 650px;
      box-shadow: 0 0 40px rgba(0,229,255,0.2);
      animation: fadeInUp 0.2s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .cite-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border-cyan-low, rgba(0,229,255,0.15));
    }
    .cite-modal-header h3 {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem;
      color: var(--cyan, #00E5FF);
    }
    .cite-close {
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      color: var(--text-secondary, #9CA3AF);
      transition: color 0.2s;
    }
    .cite-close:hover { color: var(--pink, #FF2D95); }
    .cite-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-cyan-low, rgba(0,229,255,0.15));
      padding: 0 1.5rem;
      gap: 1rem;
    }
    .cite-tab {
      background: none;
      border: none;
      padding: 0.8rem 0.2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-secondary, #9CA3AF);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .cite-tab.active {
      color: var(--cyan, #00E5FF);
      border-bottom-color: var(--cyan, #00E5FF);
    }
    .cite-tab:hover:not(.active) {
      color: var(--purple, #8B5CF6);
    }
    .cite-tab-content {
      display: none;
      padding: 1.8rem 1.5rem;
    }
    .cite-tab-content.active { display: block; }
    .cite-citation-box {
      background: rgba(0,0,0,0.5);
      border-left: 3px solid var(--purple, #8B5CF6);
      padding: 1rem;
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-primary, #E5E7EB);
      margin-bottom: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 6px;
    }
    .cite-copy-btn {
      background: var(--purple, #8B5CF6);
      border: none;
      color: white;
      padding: 8px 18px;
      font-size: 0.8rem;
      font-family: 'Space Grotesk', sans-serif;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.2s;
    }
    .cite-copy-btn:hover {
      background: var(--cyan, #00E5FF);
      color: black;
      box-shadow: 0 0 10px var(--cyan, #00E5FF);
    }

    /* ========== INTERAÇÕES (CURTIR/COMPARTILHAR) ========== */
    .post-interactions {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-cyan-low);
    }
    .like-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .like-btn {
      background: transparent;
      border: 1px solid var(--border-cyan-low);
      border-radius: 40px;
      padding: 8px 20px;
      color: var(--cyan);
      font-size: 1.2rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .like-btn:hover {
      border-color: var(--pink);
      box-shadow: 0 0 15px rgba(255,45,149,0.3);
    }
    .like-btn.liked {
      border-color: var(--pink);
      background: rgba(255,45,149,0.1);
      color: var(--pink);
    }
    .like-count {
      font-size: 1rem;
      font-family: 'JetBrains Mono', monospace;
      min-width: 2em;
      text-align: center;
    }
    .share-section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .share-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .share-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 229, 255, 0.05);
      border: 1px solid var(--border-cyan-low);
      color: var(--cyan);
      font-size: 1.1rem;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .share-btn:hover {
      background: var(--cyan);
      color: black;
      border-color: var(--cyan);
      transform: translateY(-2px);
    }
    .copy-btn {
      background: rgba(139, 92, 246, 0.1);
      border-color: var(--purple);
      color: var(--purple);
    }
    .copy-btn:hover {
      background: var(--purple);
      color: black;
    }
    .share-divider {
      width: 1px;
      height: 24px;
      background: var(--border-cyan-low);
      margin: 0 5px;
    }
    .copy-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(10,15,28,0.95);
      border: 1px solid var(--cyan);
      color: var(--cyan);
      padding: 10px 20px;
      border-radius: 40px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 9999;
    }
    .copy-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .comments-section {
      margin-top: 2rem;
    }
    #giscus-container {
      min-height: 200px;
      border-radius: 4px;
    }
  </style>
  
  {% if page.math %}
  <script>
    MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  {% endif %}
</head>
<body>
  <div class="article-app">
    <!-- Toolbar -->
    <header class="article-toolbar">
      <button class="toolbar-btn" onclick="window.location.href='{{ '/artigos' | relative_url }}'" title="Voltar para Artigos">
        <i class="fas fa-arrow-left"></i>
      </button>
      <span class="article-title-toolbar">{{ page.title }}</span>
      <div class="toolbar-actions">
        <button class="toolbar-btn" id="citeToolbarBtn" title="Citar este artigo">
          <i class="fas fa-quote-right"></i>
        </button>
        <button class="toolbar-btn" id="themeToggle" title="Alternar tema claro/escuro">
          <i class="fas fa-moon"></i>
        </button>
        <div class="font-size-controls">
          <button class="toolbar-btn" id="fontDecrease">A-</button>
          <button class="toolbar-btn" id="fontReset">A</button>
          <button class="toolbar-btn" id="fontIncrease">A+</button>
        </div>
      </div>
    </header>

    <!-- Conteúdo do artigo -->
    <main class="article-content" id="articleContent">
      <article>
        {{ content }}
      </article>

      <!-- SEÇÃO DE INTERAÇÕES (Curtir + Compartilhar + Comentários) -->
      <div class="post-interactions">
        <div class="d-flex align-items-center justify-content-between flex-wrap border-bottom border-cyan-low pb-4 mb-4">
          <div class="like-section">
            <button class="like-btn" id="likeButton">
              <i class="far fa-heart" id="likeIcon"></i>
              <span class="like-count font-code" id="likeCount">0</span>
            </button>
            <span class="like-label font-code text-cyan ms-2">APOIAR ESTA ANÁLISE</span>
          </div>
          
          <div class="share-section-header">
            <span class="font-code text-cyan me-3"><i class="fas fa-share-alt me-2"></i>COMPARTILHAR</span>
            <div class="share-buttons">
              <button class="share-btn copy-btn" id="copyPageUrlBtn" title="Copiar link">
                <i class="fas fa-link"></i>
              </button>
              <div class="share-divider"></div>
              <a href="#" id="shareTwitter" target="_blank" class="share-btn" title="Compartilhar no X/Twitter">
                <i class="fab fa-x-twitter"></i>
              </a>
              <a href="#" id="shareFacebook" target="_blank" class="share-btn" title="Compartilhar no Facebook">
                <i class="fab fa-facebook-f"></i>
              </a>
              <a href="#" id="shareLinkedIn" target="_blank" class="share-btn" title="Compartilhar no LinkedIn">
                <i class="fab fa-linkedin-in"></i>
              </a>
            </div>
          </div>
        </div>
        
        <!-- Comentários Giscus -->
        <div class="comments-section mt-4">
          <h4 class="font-code text-cyan mb-3"><i class="far fa-comment-dots me-2"></i>COMENTÁRIOS & DISCUSSÃO</h4>
          <div id="giscus-container" class="bg-black p-3 border border-cyan-low">
            <script src="https://giscus.app/client.js"
                    data-repo="jonatan-franco/jonatan-franco.github.io"
                    data-repo-id="R_kgDOPY80rQ"
                    data-category="General"
                    data-category-id="DIC_kwDOPY80rc4C7Lcl"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="top"
                    data-theme="dark"
                    data-lang="pt"
                    crossorigin="anonymous"
                    async>
            </script>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Tooltip highlight -->
  <div class="highlight-tooltip" id="highlightTooltip">
    <button id="highlightBtn"><i class="fas fa-highlighter"></i> Marcar texto</button>
  </div>

  <!-- Modal de Citação -->
  <div id="citeModal" class="cite-modal">
    <div class="cite-modal-content">
      <div class="cite-modal-header">
        <h3><i class="fas fa-quote-left me-2"></i>Citar este artigo</h3>
        <span class="cite-close">&times;</span>
      </div>
      <div class="cite-tabs">
        <button class="cite-tab active" data-tab="apa">APA 7ª ed.</button>
        <button class="cite-tab" data-tab="abnt">ABNT NBR 6023</button>
      </div>
      <div id="apaTab" class="cite-tab-content active">
        <div class="cite-citation-box" id="apaCitation"></div>
        <button class="cite-copy-btn" data-target="apaCitation">Copiar citação</button>
      </div>
      <div id="abntTab" class="cite-tab-content">
        <div class="cite-citation-box" id="abntCitation"></div>
        <button class="cite-copy-btn" data-target="abntCitation">Copiar citação</button>
      </div>
    </div>
  </div>

  <div id="copy-toast" class="copy-toast">Link copiado!</div>

  <script src="{{ '/assets/js/article.js' | relative_url }}"></script>

  <script>
    (function() {
      document.addEventListener('DOMContentLoaded', function() {
        // ========== CITAÇÃO ==========
        const title = "{{ page.title | escape }}";
        const author = "{{ page.author | default: site.title }}";
        const dateStr = "{{ page.date | date: '%Y-%m-%d' }}";
        let date;
        try {
          date = new Date(dateStr);
          if (isNaN(date.getTime())) throw new Error();
        } catch(e) {
          date = new Date();
        }
        const year = date.getFullYear();
        const month = (date.getMonth()+1).toString().padStart(2,'0');
        const day = date.getDate().toString().padStart(2,'0');
        const url = "{{ site.url }}{{ page.url }}";
        const siteName = "{{ site.title }}";
        const apa = `${author} (${year}). ${title}. ${siteName}. Recuperado em ${day}/${month}/${year} de ${url}`;
        const nameParts = author.trim().split(/\s+/);
        const lastName = nameParts.pop();
        const firstName = nameParts[0] || '';
        const meses = ['jan.','fev.','mar.','abr.','mai.','jun.','jul.','ago.','set.','out.','nov.','dez.'];
        const abnt = `${lastName.toUpperCase()}, ${firstName}. ${title}. ${siteName}, ${year}. Disponível em: ${url}. Acesso em: ${day} ${meses[date.getMonth()]}. ${year}.`;
        document.getElementById('apaCitation').innerText = apa;
        document.getElementById('abntCitation').innerText = abnt;

        // Modal citação
        const modal = document.getElementById('citeModal');
        const openBtn = document.getElementById('citeToolbarBtn');
        const closeSpan = document.querySelector('.cite-close');
        openBtn.onclick = () => modal.style.display = 'flex';
        closeSpan.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
        
        // Abas
        document.querySelectorAll('.cite-tab').forEach(tab => {
          tab.addEventListener('click', function() {
            const tabId = this.getAttribute('data-tab');
            document.querySelectorAll('.cite-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.cite-tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`${tabId}Tab`).classList.add('active');
          });
        });
        document.querySelectorAll('.cite-copy-btn').forEach(btn => {
          btn.addEventListener('click', async function() {
            const targetId = this.getAttribute('data-target');
            const text = document.getElementById(targetId).innerText;
            await navigator.clipboard.writeText(text);
            const orig = this.innerText;
            this.innerText = '✓ Copiado!';
            setTimeout(() => this.innerText = orig, 2000);
          });
        });

        // ========== CURTIR (localStorage) ==========
        const likeBtn = document.getElementById('likeButton');
        const likeIcon = document.getElementById('likeIcon');
        const likeCountSpan = document.getElementById('likeCount');
        const pageKey = 'likes_' + window.location.pathname;
        let liked = localStorage.getItem(pageKey + '_liked') === 'true';
        let count = parseInt(localStorage.getItem(pageKey + '_count')) || 0;
        
        function updateLikeUI() {
          likeCountSpan.textContent = count;
          if (liked) {
            likeIcon.className = 'fas fa-heart';
            likeBtn.classList.add('liked');
          } else {
            likeIcon.className = 'far fa-heart';
            likeBtn.classList.remove('liked');
          }
        }
        updateLikeUI();
        
        likeBtn.addEventListener('click', function() {
          liked = !liked;
          count = liked ? count + 1 : Math.max(0, count - 1);
          localStorage.setItem(pageKey + '_liked', liked);
          localStorage.setItem(pageKey + '_count', count);
          updateLikeUI();
        });

        // ========== COMPARTILHAR ==========
        const currentUrl = encodeURIComponent(window.location.href);
        const currentTitle = encodeURIComponent(document.title);
        document.getElementById('shareTwitter').href = `https://twitter.com/intent/tweet?url=${currentUrl}&text=${currentTitle}`;
        document.getElementById('shareFacebook').href = `https://www.facebook.com/sharer/sharer.php?u=${currentUrl}`;
        
        document.getElementById('copyPageUrlBtn').addEventListener('click', async function() {
          await navigator.clipboard.writeText(window.location.href);
          const toast = document.getElementById('copy-toast');
          toast.textContent = 'Link copiado!';
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2000);
        });
        
        document.getElementById('shareLinkedIn').addEventListener('click', function(e) {
          e.preventDefault();
          const url = encodeURIComponent(window.location.href);
          const title = encodeURIComponent(document.title.split('|')[0].trim());
          const linkedinUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
          window.open(linkedinUrl, '_blank');
        });
      });
    })();
  </script>
</body>
</html>
