<!DOCTYPE html>
<html lang="pt-BR" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>{{ page.title }} | {{ site.title | default: "Jonatan Franco" }}</title>
  <meta name="description" content="{{ page.excerpt | strip_html | truncate: 160 | default: site.description }}">
  
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
  <meta property="og:description" content="{{ page.excerpt | strip_html | truncate: 160 | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}/assets/img/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;600&family=JetBrains+Mono&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/article.css' | relative_url }}">
  
  {% if page.math %}
  <script>
    MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  {% endif %}
</head>
<body>
  <div class="article-app">
    <header class="article-toolbar">
      <button class="toolbar-btn" id="backBtnToolbar" title="Voltar">
        <i class="fas fa-arrow-left"></i>
      </button>
      <span class="article-title-toolbar">{{ page.title }}</span>
      <div class="toolbar-actions">
        <button class="toolbar-btn" id="citeToolbarBtn" title="Citar este artigo">
          <i class="fas fa-quote-right"></i>
        </button>
        <button class="toolbar-btn" id="themeToggle" title="Alternar tema claro/escuro">
          <i class="fas fa-moon"></i>
        </button>
        <div class="font-size-controls">
          <button class="toolbar-btn" id="fontDecrease">A-</button>
          <button class="toolbar-btn" id="fontReset">A</button>
          <button class="toolbar-btn" id="fontIncrease">A+</button>
        </div>
      </div>
    </header>

    <div class="article-layout-container">
      
      <aside class="article-sidebar">
        <div class="toc-wrapper">
          <span class="toc-title">Neste Artigo</span>
          <nav id="toc" class="toc-nav">
            </nav>
        </div>
      </aside>

      <main class="article-content" id="articleContent">
        <article>
          {{ content }}
        </article>

        <div class="post-interactions">
          <div class="d-flex align-items-center justify-content-between flex-wrap border-bottom border-cyan-low pb-4 mb-4">
            
            <div class="like-section">
              <button class="like-btn" id="likeButton">
                <i class="far fa-heart" id="likeIcon"></i>
                <span class="like-count font-code" id="likeCount">0</span>
              </button>
              <span class="like-label font-code text-cyan ms-2">APOIAR ESTA ANÁLISE</span>
            </div>
            
            <div class="share-section-header">
              <div class="share-buttons">
                <button id="nativeShareBtn" class="share-btn share-native-btn" title="Compartilhar Artigo">
                  <i class="fas fa-share-nodes"></i>
                  <span class="ms-2 font-code small">COMPARTILHAR</span>
                </button>
              </div>
            </div>

          </div> 
          
          <div class="comments-section mt-4">
            <h4 class="font-code text-cyan mb-3"><i class="far fa-comment-dots me-2"></i>COMENTÁRIOS & DISCUSSÃO</h4>

            <div id="giscus-container" class="bg-black p-3 border border-cyan-low">
              <script src="https://giscus.app/client.js"
                      data-repo="jonatan-franco/jonatan-franco.github.io"
                      data-repo-id="R_kgDOPY80rQ"
                      data-category="General"
                      data-category-id="DIC_kwDOPY80rc4C7Lcl"
                      data-mapping="pathname"
                      data-strict="0"
                      data-reactions-enabled="1"
                      data-emit-metadata="0"
                      data-input-position="top"
                      data-theme="dark"
                      data-lang="pt"
                      crossorigin="anonymous"
                      async>
              </script>
            </div>
          </div>
        </div>
      </main>

    </div>
