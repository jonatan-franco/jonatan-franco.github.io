<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image - Jonatan Franco</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0A0F1C;
      font-family: 'Space Grotesk', 'JetBrains Mono', sans-serif;
      position: relative;
    }

    /* Grid Psicométrico Progressivo com perspectiva e vibração */
    .grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 229, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.08) 1px, transparent 1px),
        radial-gradient(circle at 50% 50%, rgba(0, 229, 255, 0.03) 0%, transparent 60%);
      background-size: 40px 40px, 40px 40px, 100% 100%;
      transform: perspective(500px) rotateX(2deg);
      animation: gridPulse 8s infinite alternate;
      z-index: 1;
    }

    @keyframes gridPulse {
      0% { opacity: 0.7; background-size: 40px 40px, 40px 40px, 100% 100%; }
      100% { opacity: 1; background-size: 42px 42px, 42px 42px, 100% 100%; }
    }

    /* Caracteres matemáticos flutuantes (Σ, Ψ, Ω, etc.) */
    .math-char {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(0, 229, 255, 0.15);
      font-size: 24px;
      user-select: none;
      z-index: 2;
    }

    /* Pontos flutuantes simulando partículas de dados */
    .dot-float {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #00E5FF;
      border-radius: 50%;
      box-shadow: 0 0 8px #00E5FF;
      opacity: 0.3;
      z-index: 2;
    }

    /* Camada de conteúdo central */
    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      background: radial-gradient(circle at center, transparent 0%, rgba(10,15,28,0.7) 100%);
    }

    /* Lambda Central - Nó Latente */
    .lambda-container {
      position: relative;
      margin-bottom: 30px;
    }

    .lambda-symbol {
      font-family: 'JetBrains Mono', monospace;
      font-size: 180px;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFFFF 0%, #00E5FF 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 60px rgba(0, 229, 255, 0.5);
      position: relative;
      z-index: 5;
      animation: lambdaGlow 3s infinite alternate;
    }

    @keyframes lambdaGlow {
      0% { text-shadow: 0 0 40px rgba(0, 229, 255, 0.3); }
      100% { text-shadow: 0 0 80px rgba(0, 229, 255, 0.7); }
    }

    /* Rede complexa ao redor do Lambda (anéis concêntricos giratórios) */
    .lambda-network {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 1px solid rgba(0, 229, 255, 0.1);
      box-shadow: 0 0 100px rgba(0, 229, 255, 0.05);
      z-index: 3;
    }

    .lambda-network::before,
    .lambda-network::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px dashed rgba(0, 229, 255, 0.1);
      animation: rotate 20s linear infinite;
    }

    .lambda-network::after {
      width: 80%;
      height: 80%;
      animation-duration: 15s;
      animation-direction: reverse;
    }

    @keyframes rotate {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Nome principal - consistente com a home */
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 72px;
      font-weight: 700;
      background: linear-gradient(to right, #FFFFFF, #00E5FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      text-transform: uppercase;
      position: relative;
      z-index: 10;
    }

    /* Subtítulo técnico */
    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      color: #9CA3AF;
      letter-spacing: 4px;
      margin-bottom: 15px;
      text-transform: uppercase;
      position: relative;
      z-index: 10;
    }

    .subtitle span {
      color: #00E5FF;
    }

    /* URL do site */
    .url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      color: rgba(0, 229, 255, 0.7);
      border: 1px solid rgba(0, 229, 255, 0.2);
      padding: 8px 20px;
      border-radius: 40px;
      background: rgba(10, 15, 28, 0.6);
      backdrop-filter: blur(4px);
      margin-top: 20px;
      letter-spacing: 2px;
      position: relative;
      z-index: 10;
    }

    /* Camada extra para partículas via JS */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 4;
      pointer-events: none;
    }

    /* Importação das fontes */
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@400;700&display=swap');
  </style>
</head>
<body>
  <div class="grid-overlay"></div>
  
  <!-- Caracteres matemáticos flutuantes posicionados manualmente -->
  <div class="math-char" style="top: 15%; left: 10%; transform: rotate(-15deg);">Σ</div>
  <div class="math-char" style="top: 70%; left: 8%; font-size: 32px; opacity: 0.1;">Ψ</div>
  <div class="math-char" style="top: 20%; right: 12%; transform: rotate(10deg);">Ω</div>
  <div class="math-char" style="bottom: 15%; right: 15%; font-size: 36px;">Δ</div>
  <div class="math-char" style="top: 40%; left: 20%; font-size: 18px;">∫</div>
  <div class="math-char" style="bottom: 25%; left: 25%;">π</div>
  <div class="math-char" style="top: 60%; right: 25%;">√</div>
  <div class="math-char" style="bottom: 10%; right: 35%;">∞</div>

  <!-- Pontos flutuantes estáticos -->
  <div class="dot-float" style="top: 25%; left: 30%;"></div>
  <div class="dot-float" style="top: 45%; right: 20%; width: 3px; height: 3px;"></div>
  <div class="dot-float" style="bottom: 30%; left: 15%;"></div>
  <div class="dot-float" style="top: 55%; left: 45%;"></div>
  <div class="dot-float" style="bottom: 20%; right: 40%;"></div>

  <div class="particles"></div>

  <div class="content">
    <div class="lambda-container">
      <div class="lambda-symbol">λ</div>
      <div class="lambda-network"></div>
    </div>
    
    <h1>JONATAN FRANCO</h1>
    <div class="subtitle">
      <span>PSICOMETRIA</span> & MODELOS LATENTES
    </div>
    <div class="url">
      jonatan-franco.github.io
    </div>
  </div>

  <!-- Geração dinâmica de mais pontos flutuantes para preencher o espaço -->
  <script>
    (function() {
      const container = document.body;
      for (let i = 0; i < 20; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot-float';
        dot.style.left = Math.random() * 100 + '%';
        dot.style.top = Math.random() * 100 + '%';
        dot.style.width = (Math.random() * 3 + 1) + 'px';
        dot.style.height = dot.style.width;
        dot.style.opacity = Math.random() * 0.3 + 0.1;
        container.appendChild(dot);
      }
    })();
  </script>
</body>
</html>
